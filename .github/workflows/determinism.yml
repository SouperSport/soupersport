name: Determinism Certificate Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  determinism:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run reference semantic executor
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Running reference semantic executor..."
          .\souper_executor.exe
          Write-Host "Executor finished."

      - name: Verify semantic artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (
            !(Test-Path artifacts\semantic-trace.json) -and
            !(Test-Path artifacts\refusal.json) -and
            !(Test-Path artifacts\provenance.json)
          ) {
            Write-Error "Executor emitted no valid semantic artifacts."
          }

          Write-Host "Semantic artifacts present."

      - name: Verify provenance payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path artifacts\provenance.json) {
            Write-Host "Provenance payload found."
          }