name: Determinism Certificate Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  determinism:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Phase 2: Semantic Authority Transfer
      #
      # CI responsibilities:
      #   - invoke the semantic executor
      #   - propagate executor success or refusal
      #   - compare executor-emitted artifacts byte-canonically
      #
      # CI MUST NOT:
      #   - evaluate legality
      #   - reconstruct execution
      #   - interpret traces or refusals
      #   - regenerate goldens
      # ------------------------------------------------------------

      - name: Run reference semantic executor
        shell: bash
        run: |
          set -euo pipefail
          ./souper_executor.exe

      - name: Verify executor emitted required artifacts
        shell: bash
        run: |
          set -euo pipefail

          # Executor must emit either a semantic trace or a refusal
          if [ ! -f artifacts/semantic-trace.json ] && \
             [ ! -f artifacts/refusal.json ]; then
            echo "::error::Executor emitted neither semantic trace nor refusal artifact."
            exit 1
          fi

          # If execution occurred, provenance must exist
          if [ -f artifacts/semantic-trace.json ] && [ ! -f artifacts/provenance.json ]; then
            echo "::error::Semantic trace exists but provenance payload is missing."
            exit 1
          fi

      - name: Compare executor artifacts against goldens (byte-canonical)
        shell: bash
        run: |
          set -euo pipefail

          # Successful execution: compare semantic trace
          if [ -f artifacts/semantic-trace.json ]; then
            if [ ! -f goldens/semantic-trace.json ]; then
              echo "::error::Golden semantic trace is missing."
              exit 1
            fi
            cmp artifacts/semantic-trace.json goldens/semantic-trace.json
          fi

          # Provenance comparison
          if [ -f artifacts/provenance.json ]; then
            if [ ! -f goldens/provenance.json ]; then
              echo "::error::Golden provenance payload is missing."
              exit 1
            fi
            cmp artifacts/provenance.json goldens/provenance.json
          fi

          # Refusal comparison
          if [ -f artifacts/refusal.json ]; then
            if [ ! -f goldens/refusal.json ]; then
              echo "::error::Golden refusal artifact is missing."
              exit 1
            fi
            cmp artifacts/refusal.json goldens/refusal.json
          fi