name: Determinism Certificate Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Block golden cert changes outside the manual update workflow
      - name: Block golden cert changes outside update workflow
        shell: bash
        if: github.event_name != 'workflow_dispatch'
        run: |
          if git diff --name-only "${{ github.event.before }}...${{ github.sha }}" | grep -q "golden\.cert\.json"; then
            echo "::error::Golden certificates may only be updated via the Update Golden workflow."
            exit 1
          fi

      # Run the full determinism suite over examples/cases.yml
      - name: Run determinism suite (golden + counterfactual)
        shell: pwsh
        run: pwsh tools/run-determinism-suite.ps1 -CasesPath examples/cases.yml -CounterfactualMode alt