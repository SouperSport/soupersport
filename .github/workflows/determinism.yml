name: Determinism Certificate Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  determinism:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Phase 2: Semantic Authority Transfer
      #
      # CI responsibilities:
      #   - invoke the semantic executor
      #   - propagate executor success or refusal
      #   - compare executor-emitted artifacts byte-canonically
      #
      # CI MUST NOT:
      #   - evaluate legality
      #   - reconstruct execution
      #   - interpret traces or refusals
      #   - regenerate goldens
      # ------------------------------------------------------------

      - name: Run reference semantic executor
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\souper_executor.exe

      - name: Verify executor emitted required artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (!(Test-Path artifacts\semantic-trace.json) -and
              !(Test-Path artifacts\refusal.json)) {
            Write-Error "Executor emitted neither semantic trace nor refusal artifact."
          }

          if (Test-Path artifacts\semantic-trace.json -and
              !(Test-Path artifacts\provenance.json)) {
            Write-Error "Semantic trace exists but provenance payload is missing."
          }

      - name: Compare executor artifacts against goldens (byte-canonical)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path artifacts\semantic-trace.json) {
            if (!(Test-Path goldens\semantic-trace.json)) {
              Write-Error "Golden semantic trace is missing."
            }
            if ((Get-FileHash artifacts\semantic-trace.json).Hash -ne
                (Get-FileHash goldens\semantic-trace.json).Hash) {
              Write-Error "Semantic trace does not match golden."
            }
          }

          if (Test-Path artifacts\provenance.json) {
            if (!(Test-Path goldens\provenance.json)) {
              Write-Error "Golden provenance is missing."
            }
            if ((Get-FileHash artifacts\provenance.json).Hash -ne
                (Get-FileHash goldens\provenance.json).Hash) {
              Write-Error "Provenance payload does not match golden."
            }
          }

          if (Test-Path artifacts\refusal.json) {
            if (!(Test-Path goldens\refusal.json)) {
              Write-Error "Golden refusal artifact is missing."
            }
            if ((Get-FileHash artifacts\refusal.json).Hash -ne
                (Get-FileHash goldens\refusal.json).Hash) {
              Write-Error "Refusal artifact does not match golden."
            }
          }
