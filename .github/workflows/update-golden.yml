name: Update Golden Determinism Certificates

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are golden semantics changing?"
        required: true
        type: string

jobs:
  regenerate-golden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce sealed-only inputs
        shell: pwsh
        run: pwsh tools/enforce-sealed-inputs.ps1

      - name: Regenerate golden certificate (case01)
        shell: pwsh
        run: pwsh tools/generate-cert.ps1 `
          -SealedInputPath examples/case01/sealed_input.json `
          -InitialStatePath examples/case01/initial_state.json `
          -OutCertPath examples/case01/golden.cert.json

      - name: Show reason for update
        run: echo "Golden updated because: ${{ inputs.reason }}"